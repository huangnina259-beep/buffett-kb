<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buffett Knowledge Base</title>
    <link rel="stylesheet" href="/static/style.css?v=3">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=SF+Pro+Display:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Home State -->
        <div id="home-view" class="hero">
            <header class="home-header">
                <div class="logo-container">
                    <img src="/static/logo.png" alt="Logo" class="nav-logo">
                    <span class="brand-text">Value Investing</span>
                </div>
            </header>
            <h1 class="headline">The wisdom of the masters, distilled.</h1>

            <div class="search-wrap" id="home-search-wrap">
                <button class="plus-btn" title="Add files and more">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#5f6368" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
                <input id="home-search-input" class="search-input" type="text" placeholder="Ask Buffett · Munger · Graham · Howard Marks" autocomplete="off" />
                <button class="wave-btn" id="home-submit-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="19" x2="12" y2="5"></line>
                        <polyline points="5 12 12 5 19 12"></polyline>
                    </svg>
                </button>
            </div>

            <div class="chips">
                <button class="chip" onclick="submitHomeQuery('What is a moat?')">What is a moat?</button>
                <button class="chip" onclick="submitHomeQuery('How to calculate intrinsic value?')">How to calculate intrinsic value?</button>
                <button class="chip" onclick="submitHomeQuery('What is margin of safety?')">What is margin of safety?</button>
                <button class="chip" onclick="submitHomeQuery('Buffett vs Graham approach')">Buffett vs Graham approach</button>
                <button class="chip" onclick="submitHomeQuery('How does Munger think about risk?')">How does Munger think about risk?</button>
            </div>

            <!-- Training Mode CTA -->
            <div class="training-promo">
                <div class="training-promo-divider"><span>or try a case study</span></div>
                <button class="training-promo-card" onclick="startTraining('coca-cola')">
                    <span class="training-promo-icon">📋</span>
                    <div class="training-promo-text">
                        <strong>Coca-Cola, 1988</strong>
                        <span>How Buffett made his biggest bet · 5 steps</span>
                    </div>
                    <span class="training-promo-arrow">→</span>
                </button>
            </div>
        </div>

        <!-- Chat State -->
        <div id="chat-view" style="display: none;">
            <header class="chat-header">
                <div class="logo-container" onclick="location.reload()" title="New Conversation">
                    <img src="/static/logo.png" alt="Logo" class="nav-logo">
                    <span class="brand-text">Value Investing</span>
                </div>
                <div class="header-actions">
                    <!-- Future actions (e.g. Export, Settings) -->
                </div>
            </header>
            
            <div class="chat-container">
                <div id="sidebar" class="sidebar">
                    <div class="sidebar-header">
                        <span id="sidebar-title">Source Fragment</span>
                        <button class="close-sidebar" onclick="closeSidebar()">✕</button>
                    </div>
                    <div id="sidebar-content"></div>
                </div>
                <div id="chat-main">
                    <div id="chat-history"></div>
                    
                    <div class="chat-input-container">
                        <div class="search-wrap">
                            <button class="plus-btn" title="Add files and more">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#5f6368" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="12" y1="5" x2="12" y2="19"></line>
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                </svg>
                            </button>
                            <input id="chat-search-input" class="search-input" type="text" placeholder="Ask a follow-up question..." autocomplete="off" />
                            <button class="wave-btn" id="chat-submit-btn">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="12" y1="19" x2="12" y2="5"></line>
                                    <polyline points="5 12 12 5 19 12"></polyline>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Training View -->
        <div id="training-view" style="display: none;">
            <header class="chat-header">
                <div class="logo-container" onclick="exitTraining()">
                    <img src="/static/logo.png" alt="Logo" class="nav-logo">
                    <span class="brand-text">Value Investing</span>
                </div>
                <div class="training-header-right">
                    <span id="training-step-label" class="training-step-label"></span>
                    <button class="training-back-btn" onclick="exitTraining()">← Home</button>
                </div>
            </header>
            <div id="training-progress-wrap">
                <div id="training-progress-fill"></div>
            </div>
            <div id="training-body"></div>
        </div>
    </div>

    <input type="file" id="file-upload" style="display: none;" multiple accept=".pdf,.doc,.docx,.xls,.xlsx,.csv,.txt,image/*,.png,.jpg,.jpeg,.webp" />

    <!-- Marked.js for markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/script.js?v=2"></script>
</body>
</html>
